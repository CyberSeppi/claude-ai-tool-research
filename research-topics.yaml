# research-topics.yaml — controls WHAT the efficiency-research skill researches.
# Edit freely. weight: 1 (minor) .. 5 (must-have) — higher weight = research deeper
# and rank/prioritise its hits more strongly in the report.
#
# category must be one of: plugin-skill | mcp-server | token-tool | companion-app

topics:
  - topic: "Claude Code plugins, skill packs, token-saving skills, subagent collections, plugin marketplaces"
    category: plugin-skill
    weight: 5

  - topic: "MCP servers for web search & research-source access (multi-engine, scraping, deep research)"
    category: mcp-server
    weight: 5

  - topic: "MCP servers for up-to-date / version-specific docs (reduce hallucinated APIs)"
    category: mcp-server
    weight: 4

  - topic: "MCP servers for dev-workflow automation (git/GitHub, CI, issues/PRs)"
    category: mcp-server
    weight: 3

  - topic: "Token-saving & context-compression tools: libraries and frameworks that technically compress the context window (LLMLingua, AutoCompressor, selective-context, chunk truncation, prompt distillation, repomix)"
    category: token-tool
    weight: 4

  - topic: "Claude Code skills and prompts that reduce token usage through output-style or language transformation — caveman style, compressed English, terse response modes, verbosity-reduction system prompts, anti-hallucination brevity skills, minimal-output Claude Code plugins"
    category: token-tool
    weight: 5

  - topic: "Token-saving CLI proxies, shell wrappers, and output interceptors for Claude Code — tools that sit between the shell and the LLM (or between the LLM client and the provider), rewrite or filter tool_result blocks before they reach the context window, and reduce token usage without changing Claude's response style. Mechanisms: CLI command wrappers that strip boilerplate from build/test/git output, HTTP proxy layers that compress in-flight, pre-tool-use hook utilities, stdout truncation skills. Named examples: rtk-ai/rtk (Rust CLI proxy, 60-90% savings), headroomlabs-ai/headroom (Python HTTP proxy + MCP server, 60-95% savings), edouard-claude/snip, claudioemmanuel/squeez, HoangP8/tokless"
    category: token-tool
    weight: 5

  - topic: "Skills / agents for brainstorming & ideation"
    category: plugin-skill
    weight: 3

  - topic: "Curated GitHub directories / awesome-lists / aggregators that catalogue the best Claude Code plugins, skills & MCP servers for development (e.g. hesreallyhim/awesome-claude-code, VoltAgent/awesome-claude-code-subagents) — these are meta-sources to mine for more entries"
    category: plugin-skill
    weight: 4

  - topic: "RAG / vector-database / semantic-search MCP servers (Pinecone, Chroma, Qdrant, Weaviate, Milvus, pgvector, LanceDB) for grounding Claude Code in custom knowledge"
    category: mcp-server
    weight: 5

  - topic: "Code-RAG / repo-aware retrieval & embedding MCP servers and skills (codebase indexing, semantic code search, large-monorepo grounding) — boost Claude Code accuracy on big codebases"
    category: mcp-server
    weight: 5

  - topic: "Memory / persistent-context / knowledge-graph MCP servers for long-running RAG-style retrieval across Claude Code sessions"
    category: mcp-server
    weight: 4

  - topic: "Embedding & retrieval libraries / skills / token-efficient context-grounding tools (cuts hallucinations by injecting only the relevant chunks)"
    category: token-tool
    weight: 4

  - topic: "Free PKM / Markdown-notes apps with AI/RAG plugin ecosystem (Obsidian, Logseq, Anytype, AppFlowy)"
    category: companion-app
    weight: 4

  - topic: "Free local-LLM-runner desktop apps including mini-LLMs for local micro-tasks (LM Studio, Jan.ai, Ollama desktop, GPT4All, AnythingLLM)"
    category: companion-app
    weight: 4

  - topic: "Free AI-aware code editors / standalone IDEs (Cursor free tier, Zed AI, Windsurf, Continue.dev standalone)"
    category: companion-app
    weight: 4

  - topic: "Free AI dev-tools — VS Code / JetBrains / IDE AI plugins (Continue, Cline, Codeium free tier, Aider, Tabnine free, ProxyAI)"
    category: companion-app
